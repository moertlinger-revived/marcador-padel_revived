<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE PADEL DISPLAY</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .timer { background: #111; padding: 10px 25px; border-radius: 5px; border: 1px solid #333; text-align: center; }
        .t-label { font-size: 10px; color: #888; display: block; }
        .t-time { font-size: 26px; color: #ccff00; font-family: monospace; font-weight: bold; }

        #scoreboard { width: 100%; max-width: 900px; background: #0a0a20; border: 2px solid #333; }
        .row { display: flex; border-top: 2px solid #333; }
        .names { flex-grow: 1; padding: 20px; display: flex; align-items: center; font-size: 30px; font-weight: 900; }
        .box { width: 90px; height: 100px; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: 900; border-left: 2px solid #333; }
        .pts-box { width: 140px; background: #c6a052; color: #000; }
        .saque { width: 20px; height: 20px; background: #ccff00; border-radius: 50%; margin-left: 15px; box-shadow: 0 0 10px #ccff00; }
        
        .cambio-aviso { background: #ffcc00; color: #000; width: 100%; max-width: 900px; text-align: center; padding: 10px; font-weight: 900; margin-top: 10px; display: none; }
        .oro-anim { animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="p-box" class="timer"><span class="t-label">WARM UP</span><span id="tPel" class="t-time">05:00</span></div>
        <div class="timer"><span class="t-label">TOTAL TIME</span><span id="tPart" class="t-time">00:00:00</span></div>
    </div>

    <div id="scoreboard">
        <div class="row" id="r0">
            <div class="names"><span id="n0">EQUIPO A</span><div id="s0" class="saque" style="display:none"></div></div>
            <div class="box" id="s1-0" style="background:#d32f2f">0</div>
            <div class="box" id="s2-0" style="background:#d32f2f">0</div>
            <div class="box" id="s3-0" style="background:#d32f2f">0</div>
            <div class="box pts-box" id="p0">0</div>
        </div>
        <div class="row" id="r1">
            <div class="names"><span id="n1">EQUIPO B</span><div id="s1" class="saque" style="display:none"></div></div>
            <div class="box" id="s1-1" style="background:#d32f2f">0</div>
            <div class="box" id="s2-1" style="background:#d32f2f">0</div>
            <div class="box" id="s3-1" style="background:#d32f2f">0</div>
            <div class="box pts-box" id="p1">0</div>
        </div>
    </div>

    <div id="aviso" class="cambio-aviso">CAMBIO DE LADO / SWITCH SIDES</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        document.getElementById('n0').innerText = d.n0; document.getElementById('n1').innerText = d.n1;
        document.getElementById('p0').innerText = d.p0; document.getElementById('p1').innerText = d.p1;
        
        [0,1,2].forEach(i => {
            document.getElementById(`s${i+1}-0`).innerText = d.h0[i];
            document.getElementById(`s${i+1}-1`).innerText = d.h1[i];
            document.getElementById(`s${i+1}-0`).style.background = d.c0;
            document.getElementById(`s${i+1}-1`).style.background = d.c1;
        });

        document.getElementById('s0').style.display = d.s === 0 ? 'block' : 'none';
        document.getElementById('s1').style.display = d.s === 1 ? 'block' : 'none';
        document.getElementById('tPart').innerText = d.tPart;
        document.getElementById('tPel').innerText = d.tPel;
        document.getElementById('p-box').style.display = d.vPel ? 'block' : 'none';
        document.getElementById('aviso').style.display = d.cambio ? 'block' : 'none';
        
        document.getElementById('p0').className = "box pts-box" + (d.oro ? " oro-anim" : "");
        document.getElementById('p1').className = "box pts-box" + (d.oro ? " oro-anim" : "");
    });
</script>
</body>
</html>
