<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV DISPLAY - V20 FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Contenedor Superior: Ancho exacto del tablero */
        .header-status { 
            width: 950px; 
            display: flex; 
            align-items: flex-end; 
            height: 70px; 
            margin-bottom: 5px;
            gap: 10px; /* Espaciado uniforme entre bloques */
        }

        /* 1. RELOJ (150px) */
        .timer-tv { 
            background: #111; padding: 5px 10px; border-radius: 6px; border: 1px solid #333; 
            text-align: center; width: 150px; flex-shrink: 0; box-sizing: border-box;
        }
        .t-lab { font-size: 9px; color: #aaa; text-transform: uppercase; font-weight: bold; display: block; }
        .t-val { font-size: 24px; color: #ccff00; font-family: monospace; font-weight: bold; }

        /* 2. CAMBIO DE LADO (Cálculo automático para no empujar nada)
           950 total - 150 reloj - 160 tiebreak - 20 de gaps = 620px */
        #aviso-tv-top { 
            background: #ffcc00; color: #000; border-radius: 6px; 
            display: none; align-items: center; justify-content: center; 
            gap: 15px; height: 52px; border: 2px solid #fff;
            width: 600px; /* Ancho exacto para cubrir hasta el fin del Set 3 */
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .msg-top { font-size: 16px; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        .desc-top { font-size: 30px; font-family: monospace; font-weight: 900; }

        /* 3. TIE-BREAK (160px - Alineado con columna PUNTOS) */
        #aviso-tiebreak { 
            width: 160px; background: #d32f2f; border-radius: 6px; border: 1px solid #f00; 
            text-align: center; display: none; height: 52px; align-items: center; justify-content: center;
            flex-shrink: 0; box-sizing: border-box;
            margin-left: auto; /* Se empuja al final derecho */
        }
        .tb-txt { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; }

        /* TABLERO MARCADOR */
        #scoreboard { width: 950px; background: #0a0a20; border: 3px solid #333; }
        .labels-row { display: flex; background: rgba(255,255,255,0.05); font-size: 14px; color: #aaa; font-weight: bold; border-bottom: 2px solid #333; }
        .label-equipo { flex-grow: 1; padding: 10px 25px; }
        .label-box { width: 90px; text-align: center; padding: 10px 0; border-left: 1px solid #333; }
        
        .equipo-block { display: flex; border-bottom: 5px solid #444; }
        .equipo-block:last-child { border-bottom: none; }
        
        .nombres-col { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .jugador-row { display: flex; height: 65px; align-items: center; }
        .name-cell { flex-grow: 1; padding-left: 25px; font-size: 32px; font-weight: 800; display: flex; align-items: center; text-transform: uppercase; }
        
        .box { width: 90px; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: 900; border-left: 2px solid #333; }
        .pts-cell { width: 160px; display: flex; justify-content: center; align-items: center; font-size: 100px; font-weight: 900; background: #c6a052; color: #000; border-left: 2px solid #333; }
        
        .bola { width: 20px; height: 20px; background: #ccff00; border-radius: 50%; margin-left: 15px; display: none; box-shadow: 0 0 15px #ccff00; }
        .oro-anim { animation: flash-gold 0.8s infinite alternate; }
        @keyframes flash-gold { from { background: #c6a052; } to { background: #fff; } }
    </style>
</head>
<body>
    <div class="header-status">
        <div class="timer-tv">
            <span id="label-timer" class="t-lab">PELOTEO</span>
            <span id="val-timer" class="t-val">05:00</span>
        </div>

        <div id="aviso-tv-top">
            <span class="msg-top" id="msg-tv-desc">CAMBIO DE LADO</span>
            <span class="desc-top" id="descanso-tv-q">90</span>
        </div>

        <div id="aviso-tiebreak">
            <span class="tb-txt">TIE-BREAK</span>
        </div>
    </div>
    
    <div id="scoreboard">
        <div class="labels-row">
            <div class="label-equipo">EQUIPOS / JUGADORES</div>
            <div class="label-box">SET 1</div><div class="label-box">SET 2</div><div class="label-box">SET 3</div>
            <div style="width:160px; text-align:center; padding:10px 0; border-left:1px solid #333; color:#c6a052">PUNTOS</div>
        </div>
        
        <div class="equipo-block">
            <div class="nombres-col">
                <div class="jugador-row"><div class="name-cell"><span id="n0">-</span><div id="b0" class="bola"></div></div></div>
                <div class="jugador-row"><div class="name-cell"><span id="n1">-</span><div id="b1" class="bola"></div></div></div>
            </div>
            <div class="box" id="s1-0">0</div><div class="box" id="s2-0">0</div><div class="box" id="s3-0">0</div>
            <div class="pts-cell" id="pA">0</div>
        </div>

        <div class="equipo-block">
            <div class="nombres-col">
                <div class="jugador-row"><div class="name-cell"><span id="n2">-</span><div id="b2" class="bola"></div></div></div>
                <div class="jugador-row"><div class="name-cell"><span id="n3">-</span><div id="b3" class="bola"></div></div></div>
            </div>
            <div class="box" id="s1-1">0</div><div class="box" id="s2-1">0</div><div class="box" id="s3-1">0</div>
            <div class="pts-cell" id="pB">0</div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    db.ref("marcador/tiempos").on("value", (snap) => {
        const t = snap.val(); if(!t) return;
        document.getElementById('label-timer').innerText = t.vPel ? "PELOTEO" : "TIEMPO PARTIDO"; 
        document.getElementById('val-timer').innerText = t.vPel ? t.tPel : t.tPar; 
        
        const avisoTop = document.getElementById('aviso-tv-top');
        if(t.vDesc && t.tDesc > 0) {
            avisoTop.style.display = 'flex';
            document.getElementById('descanso-tv-q').innerText = t.tDesc;
        } else {
            avisoTop.style.display = 'none';
        }
        document.getElementById('aviso-tiebreak').style.display = t.tiebreak ? 'flex' : 'none';
    });

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        document.getElementById('n0').innerText=d.n0; document.getElementById('n1').innerText=d.n1;
        document.getElementById('n2').innerText=d.n2; document.getElementById('n3').innerText=d.n3;
        document.getElementById('pA').innerText=d.p0; document.getElementById('pB').innerText=d.p1;
        document.getElementById('msg-tv-desc').innerText = d.msg;
        [0,1,2].forEach(i => { 
            document.getElementById(`s${i+1}-0`).innerText = d.h0[i]; 
            document.getElementById(`s${i+1}-1`).innerText = d.h1[i]; 
        });
        for(let i=0; i<4; i++) document.getElementById(`b${i}`).style.display = (d.sIdx===i) ? 'block' : 'none';
        document.getElementById('pA').classList.toggle('oro-anim', d.oro);
        document.getElementById('pB').classList.toggle('oro-anim', d.oro);
    });
</script>
</body>
</html>
