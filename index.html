<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLERO PROFESIONAL - PADEL VIVO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --fip-dark: #0a0a20;
            --fip-red: #d32f2f;
            --fip-gold: #c6a052;
            --fip-number: #0a0a20;
            --fip-text: #fff;
            --fip-ball: #ccff00;
            --fip-ref-text: rgba(255,255,255,0.6);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: var(--fip-text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #scoreboard {
            width: 100%;
            max-width: 900px;
            background-color: var(--fip-dark);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .fila-referencias {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(0,0,0,0.2);
        }

        .zona-nombres-vacia { flex-grow: 1; border-right: 2px solid rgba(255,255,255,0.2); }

        .zona-numeros-ref { display: flex; }

        .casillero-ref {
            width: 90px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fip-ref-text);
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .casillero-ref.puntos-ref { width: 120px; color: var(--fip-gold); }

        .fila-equipo { display: flex; border-bottom: 2px solid rgba(255,255,255,0.2); }

        .zona-nombres {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .jugador {
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
            display: flex;
            align-items: center;
        }

        .saque-bola {
            width: 18px;
            height: 18px;
            background-color: var(--fip-ball);
            border-radius: 50%;
            margin-left: 15px;
            display: none;
            box-shadow: 0 0 10px rgba(204, 255, 0, 0.5);
        }

        .zona-numeros { display: flex; }

        .casillero {
            width: 90px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            font-weight: 900;
            color: var(--fip-number);
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .set { background-color: var(--fip-red); }
        .puntos { background-color: var(--fip-gold); width: 120px; color: #000; }

        #final-msg {
            display: none;
            background: var(--fip-ball);
            color: #000;
            padding: 10px 40px;
            font-size: 24px;
            font-weight: 900;
            margin-top: 20px;
            text-transform: uppercase;
            border-radius: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="fila-referencias">
            <div class="zona-nombres-vacia"></div>
            <div class="zona-numeros-ref">
                <div class="casillero-ref">SET 1</div>
                <div class="casillero-ref">SET 2</div>
                <div class="casillero-ref">SET 3</div>
                <div class="casillero-ref puntos-ref">PUNTOS</div>
            </div>
        </div>

        <div class="fila-equipo">
            <div class="zona-nombres">
                <div class="jugador">
                    <span id="web-n0">-</span>
                    <div class="saque-bola" id="bola-0"></div>
                </div>
            </div>
            <div class="zona-numeros">
                <div class="casillero set" id="web-s1-0">0</div>
                <div class="casillero set" id="web-s2-0">0</div>
                <div class="casillero set" id="web-s3-0">0</div>
                <div class="casillero puntos" id="web-p0">0</div>
            </div>
        </div>

        <div class="fila-equipo">
            <div class="zona-nombres">
                <div class="jugador">
                    <span id="web-n1">-</span>
                    <div class="saque-bola" id="bola-1"></div>
                </div>
            </div>
            <div class="zona-numeros">
                <div class="casillero set" id="web-s1-1">0</div>
                <div class="casillero set" id="web-s2-1">0</div>
                <div class="casillero set" id="web-s3-1">0</div>
                <div class="casillero puntos" id="web-p1">0</div>
            </div>
        </div>
    </div>

    <div id="final-msg">Partido Finalizado</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs",
        databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com",
        projectId: "padel-vivo",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val();
        if(!d) return;
        
        document.getElementById('web-n0').innerHTML = d.n0;
        document.getElementById('web-n1').innerHTML = d.n1;
        document.getElementById('web-p0').innerHTML = d.p0;
        document.getElementById('web-p1').innerHTML = d.p1;
        
        const setsA = d.h0 || [0,0,0];
        const setsB = d.h1 || [0,0,0];
        
        document.getElementById('web-s1-0').innerHTML = setsA[0];
        document.getElementById('web-s2-0').innerHTML = setsA[1];
        document.getElementById('web-s3-0').innerHTML = setsA[2];
        
        document.getElementById('web-s1-1').innerHTML = setsB[0];
        document.getElementById('web-s2-1').innerHTML = setsB[1];
        document.getElementById('web-s3-1').innerHTML = setsB[2];

        if(d.s === 0) {
            document.getElementById('bola-0').style.display = 'block';
            document.getElementById('bola-1').style.display = 'none';
        } else if(d.s === 1) {
            document.getElementById('bola-0').style.display = 'none';
            document.getElementById('bola-1').style.display = 'block';
        } else {
            document.getElementById('bola-0').style.display = 'none';
            document.getElementById('bola-1').style.display = 'none';
        }

        // Mostrar aviso de finalización
        document.getElementById('final-msg').style.display = d.finalizado ? 'block' : 'none';
    });
</script>
</body>
</html>
