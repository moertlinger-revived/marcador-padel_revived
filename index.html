<style>
    /* ... (resto del CSS igual) ... */

    /* Contenedor Superior: Ahora usamos flex para organizar las 3 partes */
    .header-status { 
        width: 950px; 
        display: flex; 
        align-items: flex-end; 
        justify-content: space-between; /* Separa los bloques */
        height: 70px; 
        margin-bottom: 5px; 
        position: relative;
    }

    /* Contenedor para agrupar Reloj y Cambio de Lado de forma seguida */
    .grupo-izquierda {
        display: flex;
        align-items: flex-end;
        gap: 10px; /* Espacio entre reloj y aviso */
        flex-grow: 1; /* Permite que este grupo crezca */
    }

    /* 1. RELOJ */
    .timer-tv { 
        background: #111; 
        padding: 5px 15px; 
        border-radius: 6px; 
        border: 1px solid #333; 
        text-align: center; 
        width: 150px; 
        flex-shrink: 0; /* Que no se achique */
    }

    /* 2. CAMBIO DE LADO 
       Ahora se ajusta automáticamente al espacio restante hasta el final del Set 3 */
    #aviso-tv-top { 
        background: #ffcc00; 
        color: #000; 
        border-radius: 6px; 
        display: none; 
        align-items: center; 
        justify-content: center; 
        gap: 20px; 
        height: 52px; 
        border: 2px solid #fff; 
        /* Ancho dinámico: Calculado para llegar al fin del Set 3 (aprox 625px desde el inicio del tablero) */
        width: 625px; 
    }

    /* 3. TIE-BREAK (Fijo a la derecha sobre puntos) */
    #aviso-tiebreak { 
        width: 160px; 
        background: #d32f2f; 
        border-radius: 6px; 
        border: 1px solid #f00; 
        text-align: center; 
        display: none; 
        height: 52px; 
        align-items: center; 
        justify-content: center;
        flex-shrink: 0;
    }
</style>

<div class="header-status">
    <div class="grupo-izquierda">
        <div class="timer-tv">
            <span id="label-timer" class="t-lab">PELOTEO</span>
            <span id="val-timer" class="t-val">05:00</span>
        </div>

        <div id="aviso-tv-top">
            <span class="msg-top" id="msg-tv-desc">CAMBIO DE LADO</span>
            <span class="desc-top" id="descanso-tv-q">90</span>
        </div>
    </div>

    <div id="aviso-tiebreak">
        <span class="tb-txt">TIE-BREAK</span>
    </div>
</div>
