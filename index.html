<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV DISPLAY - PADEL VIVO V4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Tiempos con etiquetas */
        .header { width: 900px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .timer { background: #111; padding: 5px 20px; border-radius: 5px; border: 1px solid #333; text-align: center; display: flex; flex-direction: column; }
        .t-label { font-size: 10px; color: #aaa; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
        .t-time { font-size: 24px; color: #ccff00; font-family: monospace; font-weight: bold; }
        
        /* Marcador con etiquetas de columnas */
        #scoreboard { width: 900px; background: #0a0a20; border: 2px solid #333; position: relative; }
        .labels-row { display: flex; background: rgba(255,255,255,0.05); border-bottom: 1px solid #333; }
        .label-spacer { flex-grow: 1; }
        .label-box { width: 90px; text-align: center; font-size: 12px; font-weight: bold; color: #aaa; padding: 5px 0; border-left: 1px solid #333; }
        .label-pts { width: 140px; border-left: 1px solid #333; text-align: center; font-size: 12px; font-weight: bold; color: #c6a052; padding: 5px 0; }
        
        .row { display: flex; border-top: 1px solid #333; }
        .names { flex-grow: 1; padding: 20px; font-size: 32px; font-weight: 900; display: flex; align-items: center; }
        .box { width: 90px; height: 100px; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: 900; border-left: 2px solid #333; }
        .pts { width: 140px; background: #c6a052; color: #000; }
        .bola { width: 20px; height: 20px; background: #ccff00; border-radius: 50%; margin-left: 15px; display: none; box-shadow: 0 0 10px #ccff00; }
        
        #aviso-tv-bottom { width: 900px; background: #ffcc00; color: #000; padding: 15px; border-radius: 10px; text-align: center; font-weight: 900; display: none; justify-content: center; align-items: center; gap: 20px; margin-top: 15px; animation: blinker 1.5s linear infinite; }
        #aviso-tiebreak { width: 900px; background: #d32f2f; color: #fff; padding: 8px; border-radius: 5px; text-align: center; font-weight: 900; display: none; font-size: 20px; margin-bottom: 10px; animation: pulse-red 1s infinite alternate; }
        
        @keyframes pulse-red { from { background: #800; } to { background: #f00; } }
        @keyframes blinker { 50% { background: #fff; } }
        .oro-anim { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="aviso-tiebreak">🎾 TIE-BREAK EN CURSO 🎾</div>

    <div class="header">
        <div id="box-pel" class="timer"><span class="t-label">Calentamiento</span><span id="tPel" class="t-time">05:00</span></div>
        <div class="timer"><span class="t-label">Tiempo de Partido</span><span id="tPar" class="t-time">00:00:00</span></div>
    </div>
    
    <div id="scoreboard">
        <div class="labels-row">
            <div class="label-spacer"></div>
            <div class="label-box">SET 1</div>
            <div class="label-box">SET 2</div>
            <div class="label-box">SET 3</div>
            <div class="label-pts">PUNTOS</div>
        </div>
        <div class="row">
            <div class="names"><span id="n0">-</span><div id="s0" class="bola"></div></div>
            <div class="box" id="s1-0">0</div><div class="box" id="s2-0">0</div><div class="box" id="s3-0">0</div>
            <div class="box pts" id="p0">0</div>
        </div>
        <div class="row">
            <div class="names"><span id="n1">-</span><div id="s1" class="bola"></div></div>
            <div class="box" id="s1-1">0</div><div class="box" id="s2-1">0</div><div class="box" id="s3-1">0</div>
            <div class="box pts" id="p1">0</div>
        </div>
    </div>

    <div id="aviso-tv-bottom">
        <span style="font-size: 24px;" id="msg-tv-desc">CAMBIO DE LADO</span>
        <span style="font-size: 50px; font-family: monospace;" id="descanso-tv-q">90</span>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    db.ref("marcador/tiempos").on("value", (snap) => {
        const t = snap.val(); if(!t) return;
        document.getElementById('tPar').innerText = t.tPart;
        document.getElementById('tPel').innerText = t.tPel;
        document.getElementById('box-pel').style.display = t.vPel ? 'flex' : 'none';
        document.getElementById('aviso-tv-bottom').style.display = (t.vDesc && t.tDesc > 0) ? 'flex' : 'none';
        document.getElementById('descanso-tv-q').innerText = t.tDesc;
        document.getElementById('aviso-tiebreak').style.display = t.tiebreak ? 'block' : 'none';
    });

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val(); if(!d) return;
        document.getElementById('n0').innerText = d.n0; document.getElementById('n1').innerText = d.n1;
        document.getElementById('p0').innerText = d.p0; document.getElementById('p1').innerText = d.p1;
        document.getElementById('msg-tv-desc').innerText = d.msg;
        [0,1,2].forEach(i => {
            document.getElementById(`s${i+1}-0`).innerText = d.h0[i];
            document.getElementById(`s${i+1}-1`).innerText = d.h1[i];
            document.getElementById(`s${i+1}-0`).style.background = d.c0;
            document.getElementById(`s${i+1}-1`).style.background = d.c1;
        });
        document.getElementById('s0').style.display = d.s === 0 ? 'block' : 'none';
        document.getElementById('s1').style.display = d.s === 1 ? 'block' : 'none';
        document.getElementById('p0').classList.toggle('oro-anim', d.oro);
        document.getElementById('p1').classList.toggle('oro-anim', d.oro);
    });
</script>
</body>
</html>
