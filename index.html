<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Display PADEL VIVO - Profesional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* CONFIGURACIÓN ESTRUCTURAL */
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .brand-header { 
            width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; box-sizing: border-box; border-bottom: 2px solid #333; background: #0a0a0a; 
        }
        .title-main { font-size: 20px; font-weight: 900; color: #ccff00; text-transform: uppercase; letter-spacing: 2px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 10px 0; }

        .header-status { width: 95%; max-width: 1200px; display: flex; align-items: center; margin-bottom: 10px; position: relative; }

        /* ANUNCIOS AMARILLOS RESALTADOS */
        .estilo-anuncio-amarillo { 
            background: #ffcc00; color: #000; border-radius: 12px; display: none; 
            align-items: center; justify-content: center; gap: 20px; height: 75px; 
            padding: 0 45px; border: 4px solid #fff; margin-left: 20px; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
        .msg-top { font-size: 36px; font-weight: 900; text-transform: uppercase; }
        .val-descanso { font-size: 48px; font-weight: 900; }

        #scoreboard { width: 95%; max-width: 1200px; background: #050515; border: 5px solid #333; border-radius: 12px; overflow: hidden; position: relative; }
        .equipo-block { display: flex; border-bottom: 10px solid #333; height: 160px; }
        .nombres-col { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background: #020208; gap: 10px; }
        .name-cell { font-size: 38px; font-weight: 900; text-transform: uppercase; padding-left: 30px; }
        .box { width: 110px; display: flex; justify-content: center; align-items: center; font-size: 75px; font-weight: 900; border-left: 2px solid #333; background: #0a0a0a; }
        .pts-cell { width: 220px; display: flex; justify-content: center; align-items: center; font-size: 115px; font-weight: 900; background: #c6a052; color: #000; border-left: 5px solid #333; }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="title-main">PADEL VIVO <span style="color:#444">| LIVE STREAM</span></div>
    </div>

    <div class="main-content">
        <div class="header-status">
            <div id="aviso-tv-top" class="estilo-anuncio-amarillo">
                <span class="msg-top" id="msg-tv-desc">CAMBIO</span>
                <span class="val-descanso" id="descanso-tv-q">0</span>
            </div>
        </div>

        <div id="scoreboard">
            <div class="equipo-block">
                <div class="nombres-col"><div class="name-cell" id="n0">EQUIPO 1</div></div>
                <div class="box" id="s1-0">0</div><div class="box" id="s2-0">0</div><div class="box" id="s3-0">0</div><div class="pts-cell" id="pA">0</div>
            </div>
            <div class="equipo-block">
                <div class="nombres-col"><div class="name-cell" id="n1">EQUIPO 2</div></div>
                <div class="box" id="s1-1">0</div><div class="box" id="s2-1">0</div><div class="box" id="s3-1">0</div><div class="pts-cell" id="pB">0</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    db.ref("marcador/tiempos").on("value", (snap) => {
        const t = snap.val();
        if(!t) return;
        const aviso = document.getElementById('aviso-tv-top');
        if(t.vDesc && t.tDesc > 0) {
            aviso.style.display = 'flex';
            document.getElementById('descanso-tv-q').innerText = t.tDesc;
            db.ref("marcador/actual/msg").once("value", (m) => {
                document.getElementById('msg-tv-desc').innerText = m.val() || "CAMBIO";
            });
        } else {
            aviso.style.display = 'none';
        }
    });

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val();
        if(!d) return;
        document.getElementById('pA').innerText = d.p0;
        document.getElementById('pB').innerText = d.p1;
        for(let i=0; i<3; i++) {
            document.getElementById(`s${i+1}-0`).innerText = d.h0[i];
            document.getElementById(`s${i+1}-1`).innerText = d.h1[i];
        }
    });
</script>
</body>
</html>
