<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLERO PROFESIONAL - PADEL VIVO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --fip-dark: #0a0a20;
            --fip-red: #d32f2f;
            --fip-gold: #c6a052;
            --fip-number: #0a0a20;
            --fip-text: #fff;
            --fip-ball: #ccff00;
            --fip-ref-text: rgba(255,255,255,0.6);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--fip-text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #scoreboard {
            width: 100%;
            max-width: 900px;
            background-color: var(--fip-dark);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        .fila-referencias { display: flex; background-color: rgba(0,0,0,0.4); }
        .zona-nombres-vacia { flex-grow: 1; border-right: 2px solid rgba(255,255,255,0.2); }
        .casillero-ref {
            width: 90px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: var(--fip-ref-text);
            border-right: 2px solid rgba(255,255,255,0.2);
        }
        .puntos-ref { width: 140px; color: var(--fip-gold); font-weight: bold; }

        .fila-equipo { display: flex; border-top: 2px solid rgba(255,255,255,0.2); }
        .zona-nombres {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .jugador { font-size: 32px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; }
        .saque-bola {
            width: 22px; height: 22px;
            background-color: var(--fip-ball);
            border-radius: 50%;
            margin-left: 20px;
            display: none;
            box-shadow: 0 0 15px var(--fip-ball);
        }

        .casillero {
            width: 90px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: 900;
            color: #fff;
            border-right: 2px solid rgba(255,255,255,0.2);
        }
        .set { background-color: var(--fip-red); }
        .puntos { background-color: var(--fip-gold); width: 140px; color: #000; transition: all 0.3s; }
        
        /* Animación Punto de Oro */
        .gold-point-active {
            animation: gold-glow 1s infinite alternate;
            background-color: #fff !important;
        }

        @keyframes gold-glow {
            from { box-shadow: inset 0 0 10px #000; }
            to { box-shadow: inset 0 0 40px #ffcc00; background-color: #ffcc00 !important; }
        }

        #final-msg {
            display: none;
            background: var(--fip-ball);
            color: #000;
            padding: 15px 50px;
            font-size: 30px;
            font-weight: 900;
            margin-top: 30px;
            text-transform: uppercase;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="fila-referencias">
            <div class="zona-nombres-vacia"></div>
            <div class="casillero-ref">SET 1</div>
            <div class="casillero-ref">SET 2</div>
            <div class="casillero-ref">SET 3</div>
            <div class="casillero-ref puntos-ref">PUNTOS</div>
        </div>

        <div class="fila-equipo">
            <div class="zona-nombres">
                <div class="jugador">
                    <span id="web-n0">-</span>
                    <div class="saque-bola" id="bola-0"></div>
                </div>
            </div>
            <div class="casillero set" id="web-s1-0">0</div>
            <div class="casillero set" id="web-s2-0">0</div>
            <div class="casillero set" id="web-s3-0">0</div>
            <div class="casillero puntos" id="web-p0">0</div>
        </div>

        <div class="fila-equipo">
            <div class="zona-nombres">
                <div class="jugador">
                    <span id="web-n1">-</span>
                    <div class="saque-bola" id="bola-1"></div>
                </div>
            </div>
            <div class="casillero set" id="web-s1-1">0</div>
            <div class="casillero set" id="web-s2-1">0</div>
            <div class="casillero set" id="web-s3-1">0</div>
            <div class="casillero puntos" id="web-p1">0</div>
        </div>
    </div>

    <div id="final-msg">PARTIDO FINALIZADO</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs",
        databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com",
        projectId: "padel-vivo",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val();
        if(!d) return;
        
        document.getElementById('web-n0').innerHTML = d.n0;
        document.getElementById('web-n1').innerHTML = d.n1;
        document.getElementById('web-p0').innerHTML = d.p0;
        document.getElementById('web-p1').innerHTML = d.p1;
        
        const sA = d.h0 || [0,0,0], sB = d.h1 || [0,0,0];
        document.getElementById('web-s1-0').innerHTML = sA[0];
        document.getElementById('web-s2-0').innerHTML = sA[1];
        document.getElementById('web-s3-0').innerHTML = sA[2];
        document.getElementById('web-s1-1').innerHTML = sB[0];
        document.getElementById('web-s2-1').innerHTML = sB[1];
        document.getElementById('web-s3-1').innerHTML = sB[2];

        document.getElementById('bola-0').style.display = (d.s === 0) ? 'block' : 'none';
        document.getElementById('bola-1').style.display = (d.s === 1) ? 'block' : 'none';

        // Efecto Punto de Oro
        if(d.oro) {
            document.getElementById('web-p0').classList.add('gold-point-active');
            document.getElementById('web-p1').classList.add('gold-point-active');
        } else {
            document.getElementById('web-p0').classList.remove('gold-point-active');
            document.getElementById('web-p1').classList.remove('gold-point-active');
        }

        document.getElementById('final-msg').style.display = d.finalizado ? 'block' : 'none';
    });
</script>
</body>
</html>
