<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Display PADEL VIVO - Profesional</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .brand-header { width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; border-bottom: 2px solid #333; background: #0a0a0a; }
        .title-main { font-size: 20px; font-weight: 900; color: #ccff00; text-transform: uppercase; letter-spacing: 2px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        /* ESTILO ANUNCIO RESALTADO */
        .estilo-anuncio-amarillo { 
            background: #ffcc00; color: #000; border-radius: 12px; display: none; 
            align-items: center; justify-content: center; gap: 25px; height: 90px; 
            padding: 0 50px; border: 5px solid #fff; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }
        .msg-top { font-size: 45px; font-weight: 900; text-transform: uppercase; }
        .val-descanso { font-size: 60px; font-weight: 900; }

        #scoreboard { width: 95%; max-width: 1200px; background: #050515; border: 5px solid #333; border-radius: 12px; overflow: hidden; }
        .equipo-block { display: flex; border-bottom: 5px solid #333; height: 160px; }
        .name-cell { flex-grow: 1; font-size: 40px; font-weight: 900; padding-left: 30px; display: flex; align-items: center; background: #020208; }
        .box { width: 110px; display: flex; justify-content: center; align-items: center; font-size: 75px; font-weight: 900; border-left: 2px solid #333; }
        .pts-cell { width: 220px; display: flex; justify-content: center; align-items: center; font-size: 110px; font-weight: 900; background: #c6a052; color: #000; }

        #cartel-final { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; align-items: center; justify-content: center; border: 20px solid #ccff00; }
    </style>
</head>
<body>

    <div class="brand-header">
        <div class="title-main">PADEL VIVO | <span style="color:#666">LIVE SCORE</span></div>
    </div>

    <div class="main-content">
        <div id="aviso-tv-top" class="estilo-anuncio-amarillo">
            <span class="msg-top" id="msg-tv-desc">CAMBIO</span>
            <span class="val-descanso" id="descanso-tv-q">0</span>
        </div>

        <div id="scoreboard">
            <div id="cartel-final"><div style="font-size: 80px; font-weight: 900; color: #ccff00; text-align: center;">PARTIDO<br>FINALIZADO</div></div>
            
            <div class="equipo-block">
                <div class="name-cell" id="n0">EQUIPO A</div>
                <div class="box" id="s1-0">0</div><div class="box" id="s2-0">0</div><div class="pts-cell" id="pA">0</div>
            </div>
            <div class="equipo-block">
                <div class="name-cell" id="n1">EQUIPO B</div>
                <div class="box" id="s1-1">0</div><div class="box" id="s2-1">0</div><div class="pts-cell" id="pB">0</div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    // Sincronización de tiempos y anuncios
    db.ref("marcador/tiempos").on("value", (snap) => {
        const t = snap.val();
        if(!t) return;
        const aviso = document.getElementById('aviso-tv-top');
        
        if(t.vDesc && t.tDesc > 0) {
            aviso.style.display = 'flex';
            document.getElementById('descanso-tv-q').innerText = t.tDesc;
            
            // Leemos el mensaje exacto que puso el juez (SET, SET Y CAMBIO o CAMBIO)
            db.ref("marcador/actual/msg").once("value", (msnap) => {
                document.getElementById('msg-tv-desc').innerText = msnap.val() || "DESCANSO";
            });
        } else {
            aviso.style.display = 'none';
        }
    });

    // Sincronización de marcador
    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val();
        if(!d) return;
        document.getElementById('pA').innerText = d.p0;
        document.getElementById('pB').innerText = d.p1;
        document.getElementById('s1-0').innerText = d.h0[0];
        document.getElementById('s1-1').innerText = d.h1[0];
        document.getElementById('s2-0').innerText = d.h0[1];
        document.getElementById('s2-1').innerText = d.h1[1];
    });
</script>
</body>
</html>
