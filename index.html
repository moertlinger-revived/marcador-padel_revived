<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TABLERO EN VIVO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .cabecera { color: #ccff00; font-size: 20px; margin-bottom: 30px; }
        .fila { display: flex; justify-content: center; align-items: center; background: #111; margin: 10px; border-radius: 15px; border-left: 10px solid #ccff00; padding: 20px; }
        .nombre { flex: 2; text-align: left; font-size: 40px; text-transform: uppercase; }
        .dato { flex: 1; font-size: 60px; color: #fff; }
        .punto-actual { flex: 1; font-size: 80px; color: #ccff00; }
        .tiebreak-aviso { color: red; font-size: 24px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="cabecera">PARTIDO EN VIVO</div>
    <div id="aviso" class="tiebreak-aviso" style="display:none">⚠️ TIE-BREAK ⚠️</div>

    <div class="fila">
        <div class="nombre" id="web-n0">-</div>
        <div class="dato" id="web-s0">0</div>
        <div class="dato" id="web-g0">0</div>
        <div class="punto-actual" id="web-p0">0</div>
    </div>

    <div class="fila">
        <div class="nombre" id="web-n1">-</div>
        <div class="dato" id="web-s1">0</div>
        <div class="dato" id="web-g1">0</div>
        <div class="punto-actual" id="web-p1">0</div>
    </div>

<script>
    // MISMA CONFIGURACIÓN QUE EL JUEZ
    const firebaseConfig = {
        apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs",
        databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com",
        projectId: "padel-vivo",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ESCUCHAR CAMBIOS EN TIEMPO REAL
    db.ref("marcador/actual").on("value", (snap) => {
        const d = snap.val();
        if(!d) return;
        document.getElementById('web-n0').innerHTML = d.n0;
        document.getElementById('web-n1').innerHTML = d.n1;
        document.getElementById('web-s0').innerHTML = d.s0;
        document.getElementById('web-s1').innerHTML = d.s1;
        document.getElementById('web-g0').innerHTML = d.g0;
        document.getElementById('web-g1').innerHTML = d.g1;
        document.getElementById('web-p0').innerHTML = d.p0;
        document.getElementById('web-p1').innerHTML = d.p1;
        document.getElementById('aviso').style.display = (d.m !== "NORMAL") ? "block" : "none";
    });
</script>
</body>
</html>
