<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL PRO - V11 (4 JUGADORES)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; }
        .encabezado { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .config-regla { background: #333; color: #fff; border: 2px solid #555; padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .config-regla.activo { background: #ccff00; color: #000; border-color: #ccff00; }
        
        .zona-tiempos { display: flex; justify-content: space-around; background: #111; padding: 8px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #333; }
        .timer-box { display: flex; flex-direction: column; align-items: center; }
        .timer-label { font-size: 8px; color: #aaa; font-weight: bold; }
        .timer-val { font-family: monospace; font-size: 18px; color: #ccff00; }
        
        .tablero-juez { display: flex; flex-direction: column; gap: 8px; }
        .equipo-contenedor { background: #111; border: 2px solid #333; border-radius: 12px; padding: 10px; position: relative; }
        .equipo-titulo { font-size: 10px; color: #ccff00; font-weight: bold; margin-bottom: 5px; }
        
        .fila-jugador { display: flex; align-items: center; justify-content: space-between; background: #222; margin-bottom: 4px; padding: 5px 10px; border-radius: 5px; border: 1px solid #444; }
        .fila-jugador.sirviendo { border-color: #ccff00; background: #2a2a00; }
        .nombre-j { font-size: 14px; font-weight: bold; flex-grow: 1; text-align: left; }
        
        .puntos-display { font-size: 50px; font-weight: 900; color: #c6a052; margin: 5px 0; }
        .btn-punto { width: 100%; padding: 15px; background: #c6a052; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .btn-saque-mini { font-size: 10px; padding: 5px 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }
        .btn-saque-mini.activo { background: #ccff00; color: #000; border-color: #fff; }

        .aviso-cambio { background: rgba(255, 204, 0, 0.95); color: #000; padding: 15px; font-weight: bold; border-radius: 10px; position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); z-index: 100; display: none; }
    </style>
</head>
<body>
    <div id="cambio-lado" class="aviso-cambio" onclick="this.style.display='none'">
        <span id="msg-descanso">CAMBIO</span> (<span id="reloj-descanso">90</span>s)
    </div>

    <div class="encabezado">
        <button class="config-regla" onclick="cambiarReglaTB()" id="btn-regla">TB: 6-6</button>
        <button class="config-regla" onclick="togglePuntoOro()" id="btn-oro">ORO: NO</button>
        <button class="config-regla" style="background:#555;" onclick="deshacer()">↩ CORREGIR</button>
    </div>

    <div class="zona-tiempos">
        <div class="timer-box"><span class="timer-label">PELOTEO</span><span id="disp-peloteo" class="timer-val">05:00</span></div>
        <div class="timer-box"><span class="timer-label">PARTIDO</span><span id="disp-partido" class="timer-val">00:00:00</span></div>
    </div>

    <div class="tablero-juez">
        <div class="equipo-contenedor">
            <div class="equipo-titulo">EQUIPO 1</div>
            <div class="fila-jugador" id="f-j0">
                <span class="nombre-j" onclick="cambiarNombre(0)" id="n0">JUGADOR 1A</span>
                <button class="btn-saque-mini" id="btn-s0" onclick="definirSaque(0)">SAQUE</button>
            </div>
            <div class="fila-jugador" id="f-j1">
                <span class="nombre-j" onclick="cambiarNombre(1)" id="n1">JUGADOR 1B</span>
                <button class="btn-saque-mini" id="btn-s1" onclick="definirSaque(1)">SAQUE</button>
            </div>
            <div class="puntos-display" id="pA">0</div>
            <button class="btn-punto" onclick="sumar(0)">+ PUNTO EQ 1</button>
        </div>

        <div class="equipo-contenedor">
            <div class="equipo-titulo">EQUIPO 2</div>
            <div class="fila-jugador" id="f-j2">
                <span class="nombre-j" onclick="cambiarNombre(2)" id="n2">JUGADOR 2A</span>
                <button class="btn-saque-mini" id="btn-s2" onclick="definirSaque(2)">SAQUE</button>
            </div>
            <div class="fila-jugador" id="f-j3">
                <span class="nombre-j" onclick="cambiarNombre(3)" id="n3">JUGADOR 2B</span>
                <button class="btn-saque-mini" id="btn-s3" onclick="definirSaque(3)">SAQUE</button>
            </div>
            <div class="puntos-display" id="pB">0</div>
            <button class="btn-punto" onclick="sumar(1)">+ PUNTO EQ 2</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let pts = [0,0], historialSets = [[0,0,0], [0,0,0]], setActualIdx = 0, modo = "NORMAL", limiteTB = 6, puntoOroActivo = false;
    let saqueJugadorIdx = -1; // 0, 1, 2 o 3
    let proximoSacadorEq = [0, 2]; // Indica a quién le toca sacar en el equipo A (0 o 1) y B (2 o 3)
    let stack = [];

    function sumar(eq) {
        stack.push(JSON.stringify({pts:[...pts], h:[[...historialSets[0]],[...historialSets[1]]], sIdx:setActualIdx, m:modo, sq:saqueJugadorIdx, pS:[...proximoSacadorEq]}));
        let ot=eq===0?1:0;

        if(modo==="NORMAL"){
            if(pts[eq]<3) pts[eq]++;
            else if(pts[eq]===3 && pts[ot]<3){ pts=[0,0]; ganarG(eq); }
            else if(pts[eq]===3 && pts[ot]===3){ if(puntoOroActivo) { pts=[0,0]; ganarG(eq); } else pts[eq]=4; }
            else if(pts[eq]===3 && pts[ot]===4) pts[ot]=3;
            else if(pts[eq]===4){ pts=[0,0]; ganarG(eq); }
        } else { 
            pts[eq]++;
            if((pts[0]+pts[1]) % 2 !== 0) rotarSaqueTB();
            if(pts[eq]>=7 && pts[eq]-pts[ot]>=2){ pts=[0,0]; ganarG(eq); }
        }
        render();
    }

    function ganarG(eq) {
        historialSets[eq][setActualIdx]++;
        let gTotal = historialSets[0][setActualIdx] + historialSets[1][setActualIdx];
        
        // Rotar sacador del equipo que acaba de terminar de sacar
        if(saqueJugadorIdx === 0 || saqueJugadorIdx === 1) proximoSacadorEq[0] = (saqueJugadorIdx === 0) ? 1 : 0;
        else if(saqueJugadorIdx === 2 || saqueJugadorIdx === 3) proximoSacadorEq[1] = (saqueJugadorIdx === 2) ? 3 : 2;

        // Definir quién saca el siguiente game
        let siguienteEquipo = (saqueJugadorIdx < 2) ? 1 : 0;
        saqueJugadorIdx = (siguienteEquipo === 0) ? proximoSacadorEq[0] : proximoSacadorEq[1];

        if(historialSets[0][setActualIdx] === limiteTB && historialSets[1][setActualIdx] === limiteTB) modo="TIE-BREAK";
        else if((historialSets[eq][setActualIdx]>=6) && Math.abs(historialSets[0][setActualIdx]-historialSets[1][setActualIdx])>=2) ganarS();
    }

    function rotarSaqueTB() {
        if(saqueJugadorIdx < 2) { // Sacaba equipo A, pasa a B
            saqueJugadorIdx = proximoSacadorEq[1];
            proximoSacadorEq[1] = (proximoSacadorEq[1] === 2) ? 3 : 2;
        } else { // Sacaba equipo B, pasa a A
            saqueJugadorIdx = proximoSacadorEq[0];
            proximoSacadorEq[0] = (proximoSacadorEq[0] === 0) ? 1 : 0;
        }
    }

    function definirSaque(idx) { 
        saqueJugadorIdx = idx; 
        if(idx < 2) proximoSacadorEq[0] = idx; else proximoSacadorEq[1] = idx;
        render(); 
    }

    function render() {
        let l=["0","15","30","40","Ad"];
        document.getElementById('pA').innerText=modo==="NORMAL"?l[pts[0]]:pts[0];
        document.getElementById('pB').innerText=modo==="NORMAL"?l[pts[1]]:pts[1];
        
        for(let i=0; i<4; i++) {
            document.getElementById(`btn-s${i}`).classList.toggle('activo', saqueJugadorIdx === i);
            document.getElementById(`f-j${i}`).classList.toggle('sirviendo', saqueJugadorIdx === i);
        }

        db.ref("marcador/actual").set({
            n0: document.getElementById('n0').innerText, n1: document.getElementById('n1').innerText,
            n2: document.getElementById('n2').innerText, n3: document.getElementById('n3').innerText,
            h0: historialSets[0], h1: historialSets[1], p0: document.getElementById('pA').innerText, p1: document.getElementById('pB').innerText,
            sIdx: saqueJugadorIdx, modo: modo
        });
    }

    function ganarS() { if(setActualIdx<2){ setActualIdx++; modo="NORMAL"; pts=[0,0]; render(); } }
    function cambiarNombre(i) { let n=prompt("Nombre Jugador:"); if(n) document.getElementById('n'+i).innerText=n.toUpperCase(); render(); }
    function togglePuntoOro() { puntoOroActivo=!puntoOroActivo; render(); }
    function cambiarReglaTB() { limiteTB=limiteTB===6?5:6; render(); }
    render();
</script>
</body>
</html>
