<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL CONTROL - V48</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; }
        
        .version-tag { 
            position: fixed; 
            top: 5px; 
            left: 5px; 
            font-size: 10px; 
            color: #ccff00; 
            font-weight: bold; 
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .encabezado { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 5px; background: #111; border-radius: 8px; border-bottom: 2px solid #333; }
        .grid-sets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .col-set { background: #1a1a1a; padding: 5px; border-radius: 5px; border: 1px solid #333; }
        .set-n { font-size: 10px; color: #888; display: block; margin-bottom: 2px; }
        .set-v { font-size: 24px; font-weight: bold; color: #fff; }
        .set-v.activo { color: #ccff00; }

        .btn-puntos { width: 100%; height: 140px; font-size: 80px; font-weight: 900; border: none; border-radius: 15px; color: #000; margin-bottom: 10px; background: #c6a052; box-shadow: 0 6px 0 #8a6d35; }
        .btn-puntos:active { transform: translateY(4px); box-shadow: 0 2px 0 #8a6d35; }

        .btn-accion { background: #333; color: #fff; border: none; padding: 15px; font-size: 14px; font-weight: bold; border-radius: 8px; width: 100%; }
        .btn-accion.activo { background: #ccff00; color: #000; }
        .sirviendo { border: 3px solid #ccff00 !important; background: #222 !important; }

        .jugador-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; font-size: 14px; border-radius: 5px; width: 100%; text-align: left; }
    </style>
</head>
<body>
    <div class="version-tag">V.SET_LOGIC_2024</div>
    
    <div class="encabezado">
        <div style="text-align: left;">
            <div style="font-size: 12px; color: #ccff00; font-weight: 900;">LIVE SCORE</div>
            <div style="font-size: 16px; font-weight: 900;">CONTROL JUEZ</div>
        </div>
        <div id="reloj-partido" style="font-family: monospace; font-size: 20px; color: #ccff00;">00:00:00</div>
    </div>

    <div class="grid-sets">
        <div class="col-set"><span class="set-n">SET 1</span><div class="set-v" id="s1-display">0 - 0</div></div>
        <div class="col-set"><span class="set-n">SET 2</span><div class="set-v" id="s2-display">0 - 0</div></div>
        <div class="col-set"><span class="set-n">SET 3</span><div class="set-v" id="s3-display">0 - 0</div></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <button class="jugador-btn" id="f-j0" onclick="saque(0)">• <span id="n0" contenteditable="true">Jugador 1</span></button>
            <button class="jugador-btn" id="f-j1" onclick="saque(1)">• <span id="n1" contenteditable="true">Jugador 2</span></button>
            <button class="btn-puntos" onclick="sumar(0)" id="pA">0</button>
        </div>
        <div>
            <button class="jugador-btn" id="f-j2" onclick="saque(2)">• <span id="n2" contenteditable="true">Jugador 3</span></button>
            <button class="jugador-btn" id="f-j3" onclick="saque(3)">• <span id="n3" contenteditable="true">Jugador 4</span></button>
            <button class="btn-puntos" onclick="sumar(1)" id="pB">0</button>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
        <button class="btn-accion" id="btn-oro" onclick="toggleOro()">ORO: NO</button>
        <button class="btn-accion" id="btn-stb" onclick="toggleSTB()">3er SET: NORMAL</button>
        <button class="btn-accion" onclick="undo()">UNDO</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let pts = [0,0], historialSets = [[0,0,0],[0,0,0]], setActualIdx = 0;
        let puntoOroActivo = false, modo = "NORMAL", saqueJugadorIdx = 0;

        function sumar(eq) {
            pts[eq]++;
            checkGame();
            render();
        }

        function checkGame() {
            const a = pts[0], b = pts[1];
            if(modo === "NORMAL") {
                if(puntoOroActivo && a===4 && b===4) ganarG(a > b ? 0 : 1);
                else if(a>=4 && a-b>=2) ganarG(0);
                else if(b>=4 && b-a>=2) ganarG(1);
            } else {
                if(a>=7 && a-b>=2) ganarG(0);
                else if(b>=7 && b-a>=2) ganarG(1);
            }
        }

        function ganarG(eq) {
            pts = [0,0];
            historialSets[eq][setActualIdx]++;
            checkSet();
        }

        function checkSet() {
            let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
            if((gA>=6 || gB>=6) && Math.abs(gA-gB)>=2) {
                checkWinnerSets();
            } else if(gA===7 || gB===7) {
                checkWinnerSets();
            } else {
                if((gA+gB)%2 !== 0) dispararAviso("CAMBIO", 90);
            }
        }

        function checkWinnerSets() {
            let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
            let sumaSet = gA + gB;
            
            // NUEVA LÓGICA DE ANUNCIO DE SET
            let msgSet = (sumaSet % 2 === 0) ? "SET" : "SET Y CAMBIO";
            dispararAviso(msgSet, 120);

            setActualIdx++;
            render();
        }

        function dispararAviso(msg, tiempo) {
            db.ref("marcador/actual/msg").set(msg);
            db.ref("marcador/tiempos").update({ vDesc: true, tDesc: tiempo });
        }

        function render() {
            const l = ["0","15","30","40","Ad"];
            document.getElementById('pA').innerText = modo==="NORMAL" ? l[pts[0]] : pts[0];
            document.getElementById('pB').innerText = modo==="NORMAL" ? l[pts[1]] : pts[1];
            for(let i=0; i<3; i++) {
                document.getElementById(`s${i+1}-display`).innerText = `${historialSets[0][i]} - ${historialSets[1][i]}`;
            }
            db.ref("marcador/actual").update({
                p0: document.getElementById('pA').innerText,
                p1: document.getElementById('pB').innerText,
                h0: historialSets[0], h1: historialSets[1]
            });
        }
    </script>
</body>
</html>
