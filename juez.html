<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL PRO - V28 STB 10/11</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; }
        .encabezado { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .config-regla { background: #333; color: #fff; border: 2px solid #555; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; min-width: 90px; }
        .config-regla.activo { background: #ccff00; color: #000; border-color: #fff; }
        .btn-reset-total { background: #d32f2f; color: #fff; border: 2px solid #f00; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .zona-tiempos { display: flex; justify-content: space-around; background: #111; padding: 8px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #333; }
        .timer-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .timer-label { font-size: 8px; color: #aaa; font-weight: bold; }
        .timer-val { font-family: monospace; font-size: 18px; color: #ccff00; font-weight: bold; }
        .btn-t { font-size: 9px; padding: 4px 8px; background: #444; color: #fff; border: none; border-radius: 3px; cursor: pointer; }
        .tablero-juez { display: flex; flex-direction: column; gap: 8px; }
        .equipo-contenedor { background: #111; border: 2px solid #333; border-radius: 12px; padding: 10px; }
        .fila-jugador { display: flex; align-items: center; justify-content: space-between; background: #222; margin-bottom: 5px; padding: 8px; border-radius: 8px; border: 2px solid transparent; }
        .fila-jugador.sirviendo { border-color: #ccff00; background: #2a2a00; }
        .nombre-j { font-size: 14px; font-weight: bold; flex-grow: 1; text-align: left; }
        .btn-saque-mini { font-size: 10px; padding: 6px; background: #444; color: #fff; border: 1px solid #666; border-radius: 5px; }
        .btn-saque-mini.activo { background: #ccff00; color: #000; }
        .puntos-display { font-size: 55px; font-weight: 900; color: #c6a052; margin: 5px 0; }
        .btn-punto { width: 100%; padding: 15px; background: #c6a052; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; color: #000; }
        .aviso-cambio { background: rgba(255, 204, 0, 0.95); color: #000; padding: 15px; font-weight: bold; border-radius: 10px; position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); z-index: 100; display: none; cursor: pointer; border: 3px solid #fff; }
    </style>
</head>
<body onload="cargarLocal()">
    <div id="cambio-lado" class="aviso-cambio" onclick="aceptarCambio()">
        <span id="msg-descanso">CAMBIO DE LADO</span> (<span id="reloj-descanso">90</span>s)
    </div>

    <div class="encabezado">
        <button class="config-regla" onclick="cambiarReglaTB()" id="btn-regla">TB: 6-6</button>
        <button class="config-regla" onclick="cicloSTB()" id="btn-stb">3er SET: NORMAL</button>
        <button class="config-regla" onclick="togglePuntoOro()" id="btn-oro">ORO: NO</button>
        <button class="config-regla" style="background:#555;" onclick="deshacer()">↩ CORREGIR</button>
        <button class="btn-reset-total" onclick="resetTotal()">⚠️ RESET TOTAL</button>
    </div>

    <div class="zona-tiempos">
        <div class="timer-box">
            <span class="timer-label">CALENTAMIENTO</span>
            <span id="disp-peloteo" class="timer-val">05:00</span>
            <div><button class="btn-t" onclick="toggleTimer('peloteo')">PLAY</button><button class="btn-t" onclick="resetTimer('peloteo')">RESET</button><button class="btn-t" onclick="toggleVisPeloteo()">👁️</button></div>
        </div>
        <div class="timer-box">
            <span class="timer-label">TIEMPO PARTIDO</span>
            <span id="disp-partido" class="timer-val">00:00:00</span>
            <div><button class="btn-t" onclick="toggleTimer('partido')">PLAY / PAUSE</button></div>
        </div>
    </div>

    <div class="tablero-juez">
        <div class="equipo-contenedor">
            <div class="fila-jugador" id="f-j0"><span class="nombre-j" id="n0" onclick="cambiarNombre(0)">JUGADOR 1A</span><button class="btn-saque-mini" id="btn-s0" onclick="definirSaque(0)">SAQUE</button></div>
            <div class="fila-jugador" id="f-j1"><span class="nombre-j" id="n1" onclick="cambiarNombre(1)">JUGADOR 1B</span><button class="btn-saque-mini" id="btn-s1" onclick="definirSaque(1)">SAQUE</button></div>
            <div class="puntos-display" id="pA">0</div>
            <button class="btn-punto" onclick="sumar(0)">+ EQ 1</button>
        </div>
        <div class="equipo-contenedor">
            <div class="fila-jugador" id="f-j2"><span class="nombre-j" id="n2" onclick="cambiarNombre(2)">JUGADOR 2A</span><button class="btn-saque-mini" id="btn-s2" onclick="definirSaque(2)">SAQUE</button></div>
            <div class="fila-jugador" id="f-j3"><span class="nombre-j" id="n3" onclick="cambiarNombre(3)">JUGADOR 2B</span><button class="btn-saque-mini" id="btn-s3" onclick="definirSaque(3)">SAQUE</button></div>
            <div class="puntos-display" id="pB">0</div>
            <button class="btn-punto" onclick="sumar(1)">+ EQ 2</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    // modoSTB: 0 = Normal, 1 = STB 10 pts, 2 = STB 11 pts
    let pts = [0,0], historialSets = [[0,0,0], [0,0,0]], setActualIdx = 0, modo = "NORMAL", limiteTB = 6, puntoOroActivo = false, modoSTB = 0;
    let saqueJugadorIdx = -1, proximoSacadorEq = [0, 2], stack = [];
    let segP = 0, segPel = 300, runP = false, runPel = false, visPel = true;
    let segDescanso = 0, runDescanso = false, cambioVisible = false;

    setInterval(() => {
        if(runP) segP++;
        if(runPel && segPel > 0) segPel--;
        if(runDescanso && segDescanso > 0) {
            segDescanso--;
            document.getElementById('reloj-descanso').innerText = segDescanso;
        } else if(segDescanso === 0 && runDescanso) { aceptarCambio(); }
        actualizarDisplaysTiempos();
        enviarTiemposFirebase();
    }, 1000);

    function actualizarDisplaysTiempos() {
        let h=Math.floor(segP/3600).toString().padStart(2,'0'), m=Math.floor((segP%3600)/60).toString().padStart(2,'0'), s=(segP%60).toString().padStart(2,'0');
        let pm=Math.floor(segPel/60).toString().padStart(2,'0'), ps=(segPel%60).toString().padStart(2,'0');
        document.getElementById('disp-partido').innerText = `${h}:${m}:${s}`;
        document.getElementById('disp-peloteo').innerText = `${pm}:${ps}`;
    }

    function enviarTiemposFirebase() {
        let h=Math.floor(segP/3600).toString().padStart(2,'0'), m=Math.floor((segP%3600)/60).toString().padStart(2,'0'), s=(segP%60).toString().padStart(2,'0');
        let pm=Math.floor(segPel/60).toString().padStart(2,'0'), ps=(segPel%60).toString().padStart(2,'0');
        db.ref("marcador/tiempos").set({ tPar:`${h}:${m}:${s}`, tPel:`${pm}:${ps}`, vPel:visPel, tDesc:segDescanso, vDesc:cambioVisible, tiebreak:(modo==="TIE-BREAK") });
    }

    function guardarLocal() {
        const estado = { pts, historialSets, setActualIdx, modo, limiteTB, puntoOroActivo, modoSTB, saqueJugadorIdx, proximoSacadorEq, stack, segP, n0:document.getElementById('n0').innerText, n1:document.getElementById('n1').innerText, n2:document.getElementById('n2').innerText, n3:document.getElementById('n3').innerText };
        localStorage.setItem('padel_pro_backup', JSON.stringify(estado));
    }

    function cargarLocal() {
        const backup = localStorage.getItem('padel_pro_backup');
        if (backup) {
            const e = JSON.parse(backup);
            pts=e.pts; historialSets=e.historialSets; setActualIdx=e.setActualIdx; modo=e.modo; limiteTB=e.limiteTB; puntoOroActivo=e.puntoOroActivo; modoSTB=e.modoSTB||0; saqueJugadorIdx=e.saqueJugadorIdx; proximoSacadorEq=e.proximoSacadorEq; stack=e.stack||[]; segP=e.segP||0;
            document.getElementById('n0').innerText=e.n0; document.getElementById('n1').innerText=e.n1; document.getElementById('n2').innerText=e.n2; document.getElementById('n3').innerText=e.n3;
            render();
        }
    }

    function resetTotal() { if(confirm("¿RESET TOTAL?")) { localStorage.removeItem('padel_pro_backup'); db.ref("marcador").remove(); location.reload(); } }

    function sumar(eq) {
        stack.push(JSON.stringify({pts:[...pts], h:[[...historialSets[0]],[...historialSets[1]]], sIdx:setActualIdx, m:modo, sq:saqueJugadorIdx, pS:[...proximoSacadorEq], oro: puntoOroActivo, lim: limiteTB, mstb: modoSTB}));
        if(!runP && !visPel) runP = true;
        let ot = eq === 0 ? 1 : 0;
        
        if(modo === "NORMAL") {
            if(pts[eq]<3) pts[eq]++;
            else if(pts[eq]===3 && pts[ot]<3) { pts=[0,0]; ganarG(eq); }
            else if(pts[eq]===3 && pts[ot]===3) { if(puntoOroActivo) { pts=[0,0]; ganarG(eq); } else pts[eq]=4; }
            else if(pts[eq]===3 && pts[ot]===4) pts[ot]=3;
            else if(pts[eq]===4) { pts=[0,0]; ganarG(eq); }
        } else {
            pts[eq]++;
            if((pts[0] + pts[1]) % 6 === 0) dispararAviso("CAMBIO DE LADO (TB)", 10);
            if((pts[0]+pts[1]) % 2 !== 0) rotarSaqueTB();
            
            // Meta dinámica: 11 si modoSTB es 2, 10 si modoSTB es 1, 7 si es TB normal
            let meta = 7;
            if(setActualIdx === 2) {
                if(modoSTB === 1) meta = 10;
                else if(modoSTB === 2) meta = 11;
            }
            
            if(pts[eq]>=meta && (pts[eq]-pts[ot])>=2) { pts=[0,0]; ganarG(eq); }
        }
        render();
    }

    function ganarG(eq) {
        historialSets[eq][setActualIdx]++;
        let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
        let totalG = gA + gB;
        
        if(saqueJugadorIdx === 0 || saqueJugadorIdx === 1) proximoSacadorEq[0] = (saqueJugadorIdx === 0) ? 1 : 0;
        else if(saqueJugadorIdx === 2 || saqueJugadorIdx === 3) proximoSacadorEq[1] = (saqueJugadorIdx === 2) ? 3 : 2;
        let siguienteEq = (saqueJugadorIdx < 2) ? 1 : 0;
        saqueJugadorIdx = (siguienteEq === 0) ? proximoSacadorEq[0] : proximoSacadorEq[1];

        if(totalG === 1 && modo === "NORMAL") dispararAviso("SOLO CAMBIO DE LADO", 10);
        else if((gA>=6||gB>=6) && Math.abs(gA-gB)>=2 || modo==="TIE-BREAK") { 
            dispararAviso((totalG % 2 !== 0) ? "SET Y CAMBIO" : "SET FINALIZADO", 120); 
            ganarS(); 
        }
        else if(totalG % 2 !== 0) dispararAviso("CAMBIO DE LADO", 90);
        
        if(gA === limiteTB && gB === limiteTB) modo = "TIE-BREAK";
    }

    function ganarS() { 
        if(setActualIdx < 2) { 
            setActualIdx++; 
            pts=[0,0]; 
            // Si hay STB (10 o 11), entramos directo a TIE-BREAK al iniciar el 3er set
            if(setActualIdx === 2 && modoSTB > 0) {
                modo = "TIE-BREAK";
            } else {
                modo = "NORMAL";
            }
            render(); 
        } 
    }

    function cicloSTB() { 
        modoSTB = (modoSTB + 1) % 3; // 0 -> 1 -> 2 -> 0
        render(); 
    }

    function dispararAviso(msg, seg) { cambioVisible = true; segDescanso = seg; runDescanso = true; document.getElementById('msg-descanso').innerText = msg; document.getElementById('cambio-lado').style.display = "block"; }
    function aceptarCambio() { cambioVisible = false; runDescanso = false; document.getElementById('cambio-lado').style.display = "none"; render(); }
    function toggleTimer(t) { if(t==='partido') runP=!runP; else runPel=!runPel; }
    function resetTimer(t) { if(t==='peloteo') segPel=300; }
    function toggleVisPeloteo() { visPel = !visPel; render(); }
    function rotarSaqueTB() { if(saqueJugadorIdx < 2) { saqueJugadorIdx = proximoSacadorEq[1]; proximoSacadorEq[1] = (proximoSacadorEq[1] === 2) ? 3 : 2; } else { saqueJugadorIdx = proximoSacadorEq[0]; proximoSacadorEq[0] = (proximoSacadorEq[0] === 0) ? 1 : 0; } }
    function deshacer() { if(stack.length > 0) { let e = JSON.parse(stack.pop()); pts=e.pts; historialSets=e.h; setActualIdx=e.sIdx; modo=e.m; saqueJugadorIdx=e.sq; proximoSacadorEq=e.pS; puntoOroActivo=e.oro; limiteTB=e.lim; modoSTB=e.mstb; render(); } }
    function togglePuntoOro() { puntoOroActivo = !puntoOroActivo; render(); }
    function cambiarReglaTB() { limiteTB = (limiteTB === 6) ? 5 : 6; render(); }
    function definirSaque(idx) { saqueJugadorIdx = idx; render(); }
    function cambiarNombre(i) { let n = prompt("Nombre:"); if(n) document.getElementById('n'+i).innerText = n.toUpperCase(); render(); }

    function render() {
        const l = ["0","15","30","40","Ad"];
        document.getElementById('pA').innerText = modo==="NORMAL" ? l[pts[0]] : pts[0];
        document.getElementById('pB').innerText = modo==="NORMAL" ? l[pts[1]] : pts[1];
        
        let txtSTB = "3er SET: NORMAL";
        if(modoSTB === 1) txtSTB = "3er SET: STB (10)";
        else if(modoSTB === 2) txtSTB = "3er SET: STB (11)";
        
        document.getElementById('btn-stb').innerText = txtSTB;
        document.getElementById('btn-stb').className = "config-regla" + (modoSTB > 0 ? " activo" : "");
        
        document.getElementById('btn-oro').innerText = "ORO: " + (puntoOroActivo ? "SÍ" : "NO");
        document.getElementById('btn-oro').className = "config-regla" + (puntoOroActivo ? " activo" : "");
        document.getElementById('btn-regla').innerText = "TB: " + limiteTB + "-" + limiteTB;
        document.getElementById('btn-regla').className = "config-regla" + (limiteTB === 5 ? " activo" : "");
        
        for(let i=0; i<4; i++) {
            document.getElementById(`btn-s${i}`).classList.toggle('activo', saqueJugadorIdx === i);
            document.getElementById(`f-j${i}`).classList.toggle('sirviendo', saqueJugadorIdx === i);
        }
        db.ref("marcador/actual").set({
            n0: document.getElementById('n0').innerText, n1: document.getElementById('n1').innerText, n2: document.getElementById('n2').innerText, n3: document.getElementById('n3').innerText,
            h0: historialSets[0], h1: historialSets[1], p0: document.getElementById('pA').innerText, p1: document.getElementById('pB').innerText,
            sIdx: saqueJugadorIdx, modo: modo, oro: (puntoOroActivo && pts[0]===3 && pts[1]===3), msg: document.getElementById('msg-descanso').innerText
        });
        guardarLocal();
    }
</script>
</body>
</html>
