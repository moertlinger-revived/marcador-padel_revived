<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PADEL CONTROL - PROFESIONAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 5px; text-align: center; }
        .version-tag { position: fixed; top: 5px; left: 5px; font-size: 10px; color: #ccff00; font-weight: bold; z-index: 9999; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { background: #333; color: #fff; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 10px; }
        .btn-puntos { background: #c6a052; color: #000; font-size: 40px; height: 120px; }
        .marcador { font-size: 30px; margin: 10px 0; background: #111; padding: 10px; border-radius: 10px; }
        .controles-extra { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .btn-sm { padding: 10px; font-size: 12px; background: #222; }
        .activo { background: #ccff00 !important; color: #000 !important; }
        .sirviendo { border: 4px solid #ccff00; }
    </style>
</head>
<body>
    <div class="version-tag">V.LOGIC_SET_REGLA</div>
    
    <div class="marcador">
        <div id="display-sets">SET 1: 0-0</div>
        <div style="font-size: 50px; color: #ccff00;"><span id="pA">0</span> - <span id="pB">0</span></div>
    </div>

    <div class="grid">
        <button class="btn btn-puntos" onclick="sumar(0)">EQ. A</button>
        <button class="btn btn-puntos" onclick="sumar(1)">EQ. B</button>
    </div>

    <div class="controles-extra">
        <button class="btn btn-sm" id="btn-oro" onclick="toggleOro()">ORO: NO</button>
        <button class="btn btn-sm" onclick="restaurar()">BORRAR TODO</button>
        <button class="btn btn-sm" onclick="undo()">UNDO</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let pts = [0,0], historialSets = [[0,0,0],[0,0,0]], setActualIdx = 0;
        let saqueJugadorIdx = 0, puntoOroActivo = false, modo = "NORMAL";

        function sumar(eq) {
            pts[eq]++;
            checkGame();
            render();
        }

        function checkGame() {
            const a = pts[0], b = pts[1];
            if(modo === "NORMAL") {
                if(puntoOroActivo && a===4 && b===4) { ganarG(a > b ? 0 : 1); }
                else if(a>=4 && a-b>=2) ganarG(0);
                else if(b>=4 && b-a>=2) ganarG(1);
            } else {
                if(a>=7 && a-b>=2) ganarG(0);
                else if(b>=7 && b-a>=2) ganarG(1);
            }
        }

        function ganarG(eq) {
            pts = [0,0];
            historialSets[eq][setActualIdx]++;
            checkSet();
        }

        function checkSet() {
            let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
            if((gA >= 6 || gB >= 6) && Math.abs(gA - gB) >= 2) {
                checkWinnerSets();
            } else if(gA === 7 || gB === 7) {
                checkWinnerSets();
            } else {
                // Durante el set: si la suma es impar, aviso de CAMBIO (90s)
                if((gA + gB) % 2 !== 0) dispararAviso("CAMBIO", 90);
            }
        }

        function checkWinnerSets() {
            let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
            let suma = gA + gB;
            
            // Lógica solicitada para el anuncio de SET
            let mensajeSet = (suma % 2 === 0) ? "SET" : "SET Y CAMBIO";
            dispararAviso(mensajeSet, 120);

            setActualIdx++;
            if(setActualIdx > 2) cerrarPartido();
            render();
        }

        function dispararAviso(msg, tiempo) {
            db.ref("marcador/actual/msg").set(msg);
            db.ref("marcador/tiempos").update({
                vDesc: true,
                tDesc: tiempo,
                isFinSet: msg.includes("SET")
            });
            // Auto-cerrar aviso tras 5 segundos de gracia o dejar que el timer lo maneje
        }

        function render() {
            document.getElementById('pA').innerText = pts[0];
            document.getElementById('pB').innerText = pts[1];
            document.getElementById('display-sets').innerText = `SET ${setActualIdx+1}: ${historialSets[0][setActualIdx]}-${historialSets[1][setActualIdx]}`;
            
            db.ref("marcador/actual").update({
                p0: pts[0], p1: pts[1],
                h0: historialSets[0], h1: historialSets[1],
                sIdx: saqueJugadorIdx
            });
        }

        function restaurar() { if(confirm("¿Borrar todo?")) { location.reload(); db.ref("marcador").set(null); } }
    </script>
</body>
</html>
