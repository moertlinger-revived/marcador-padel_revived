<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PROFESIONAL V3.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; text-align: center; }
        
        .encabezado { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .config-regla { background: #333; color: #fff; border: 1px solid #c6a052; padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .config-regla.activo { background: #c6a052; color: #000; }

        .zona-tiempos { display: flex; justify-content: space-around; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .timer-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .timer-val { font-family: monospace; font-size: 22px; color: #ccff00; font-weight: bold; }
        .controles-timer { display: flex; gap: 3px; }
        .btn-timer { font-size: 9px; padding: 5px; background: #444; color: white; border: none; border-radius: 3px; cursor: pointer; text-transform: uppercase; }
        .btn-timer.active { background: #c6a052; color: #000; }

        .tablero-juez { display: flex; flex-direction: column; gap: 10px; height: 50vh; }
        .equipo-juez { background: #111; border: 2px solid #333; border-radius: 15px; padding: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        
        .color-picker { position: absolute; top: 10px; right: 10px; width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .nombre-eq { color: #fff; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .puntos-juez { font-size: 60px; font-weight: 900; color: #c6a052; }
        
        .zona-controles { width: 100%; display: flex; gap: 10px; }
        .btn-accion { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-punto { background: #c6a052; color: #000; }
        .btn-saque { background: #333; color: #ccff00; border: 1px solid #ccff00; }
        .btn-saque.activo { background: #ccff00; color: #000; }

        .aviso-cambio { background: #ffcc00; color: #000; padding: 8px; font-weight: bold; border-radius: 5px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="encabezado">
        <button class="config-regla" onclick="cambiarReglaTB()" id="btn-regla">TB: 6-6</button>
        <button class="config-regla" onclick="togglePuntoOro()" id="btn-oro">ORO: NO</button>
        <button class="config-regla" style="background:#555" onclick="deshacer()">↩ CORREGIR</button>
    </div>

    <div class="zona-tiempos">
        <div class="timer-box">
            <span style="font-size: 10px; color: #888;">PELOTEO (5m)</span>
            <span id="disp-peloteo" class="timer-val">05:00</span>
            <div class="controles-timer">
                <button class="btn-timer" id="btn-play-pel" onclick="toggleTimer('peloteo')">Play/Pausa</button>
                <button class="btn-timer" onclick="resetTimer('peloteo')">Reiniciar</button>
                <button class="btn-timer" id="btn-vis-pel" onclick="toggleVisibilidadPeloteo()">Ocultar</button>
            </div>
        </div>
        <div class="timer-box">
            <span style="font-size: 10px; color: #888;">TIEMPO PARTIDO</span>
            <span id="disp-partido" class="timer-val">00:00:00</span>
            <div class="controles-timer">
                <button class="btn-timer" id="btn-play-par" onclick="toggleTimer('partido')">Play/Pausa</button>
                <button class="btn-timer" onclick="resetTimer('partido')">Reiniciar</button>
            </div>
        </div>
    </div>

    <div id="cambio-lado" class="aviso-cambio">⚠️ CAMBIO DE LADO ⚠️</div>

    <div class="tablero-juez">
        <div class="equipo-juez">
            <input type="color" class="color-picker" id="colA" value="#d32f2f" onchange="render()">
            <div class="nombre-eq" onclick="cambiarNombre(0)" id="nA">EQUIPO A</div>
            <div class="puntos-juez" id="pA">0</div>
            <div class="zona-controles">
                <button class="btn-accion btn-punto" onclick="sumar(0)">+ PUNTO</button>
                <button class="btn-accion btn-saque" id="saqueA" onclick="definirSaque(0)">SAQUE</button>
            </div>
        </div>
        <div class="equipo-juez">
            <input type="color" class="color-picker" id="colB" value="#d32f2f" onchange="render()">
            <div class="nombre-eq" onclick="cambiarNombre(1)" id="nB">EQUIPO B</div>
            <div class="puntos-juez" id="pB">0</div>
            <div class="zona-controles">
                <button class="btn-accion btn-punto" onclick="sumar(1)">+ PUNTO</button>
                <button class="btn-accion btn-saque" id="saqueB" onclick="definirSaque(1)">SAQUE</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs", databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com", projectId: "padel-vivo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let pts = [0,0], historialSets = [[0,0,0], [0,0,0]], setActualIdx = 0;
    let saqueEquipo = -1, modo = "NORMAL", limiteTB = 6, puntoOroActivo = false;
    let segPartido = 0, segPeloteo = 300, runPartido = false, runPeloteo = false, showPeloteo = true;
    let stackHistorial = [];

    // --- LÓGICA DE TIEMPOS ---
    setInterval(() => {
        if(runPartido) segPartido++;
        if(runPeloteo && segPeloteo > 0) segPeloteo--;
        
        actualizarUIRelojes();
        sincronizarRelojesFirebase(); // Esto asegura que el espectador vea el segundero fluir
    }, 1000);

    function actualizarUIRelojes() {
        let h = Math.floor(segPartido/3600).toString().padStart(2,'0'), m = Math.floor((segPartido%3600)/60).toString().padStart(2,'0'), s = (segPartido%60).toString().padStart(2,'0');
        document.getElementById('disp-partido').innerText = `${h}:${m}:${s}`;
        let pm = Math.floor(segPeloteo/60).toString().padStart(2,'0'), ps = (segPeloteo%60).toString().padStart(2,'0');
        document.getElementById('disp-peloteo').innerText = `${pm}:${ps}`;
    }

    function sincronizarRelojesFirebase() {
        db.ref("marcador/tiempos").set({
            tPart: document.getElementById('disp-partido').innerText,
            tPel: document.getElementById('disp-peloteo').innerText,
            vPel: showPeloteo
        });
    }

    function toggleTimer(tipo) {
        if(tipo === 'partido') {
            runPartido = !runPartido;
            document.getElementById('btn-play-par').classList.toggle('active', runPartido);
        } else {
            runPeloteo = !runPeloteo;
            document.getElementById('btn-play-pel').classList.toggle('active', runPeloteo);
        }
    }

    function resetTimer(tipo) {
        if(tipo === 'partido') { segPartido = 0; runPartido = false; } 
        else { segPeloteo = 300; runPeloteo = false; }
        actualizarUIRelojes();
        sincronizarRelojesFirebase();
    }

    function toggleVisibilidadPeloteo() {
        showPeloteo = !showPeloteo;
        document.getElementById('btn-vis-pel').innerText = showPeloteo ? "Ocultar" : "Mostrar";
        sincronizarRelojesFirebase();
    }

    // --- LÓGICA DE JUEGO ---
    function sumar(eq) {
        stackHistorial.push(JSON.stringify({ pts: [...pts], hSets: [ [...historialSets[0]], [...historialSets[1]] ], setIdx: setActualIdx, modo: modo, saque: saqueEquipo }));
        if(!runPartido && segPartido === 0) runPartido = true; 
        let ot = eq === 0 ? 1 : 0;
        if(modo === "NORMAL") {
            if(pts[eq] < 3) pts[eq]++;
            else if(pts[eq] === 3 && pts[ot] < 3) { pts=[0,0]; ganarGame(eq); }
            else if(pts[eq] === 3 && pts[ot] === 3) { if(puntoOroActivo) { pts=[0,0]; ganarGame(eq); } else pts[eq]=4; }
            else if(pts[eq] === 3 && pts[ot] === 4) pts[ot]=3;
            else if(pts[eq] === 4) { pts=[0,0]; ganarGame(eq); }
        } else {
            pts[eq]++;
            if(pts[eq] >= 7 && (pts[eq]-pts[ot] >= 2)) { pts=[0,0]; ganarGame(eq); }
        }
        render();
    }

    function ganarGame(eq) {
        historialSets[eq][setActualIdx]++;
        let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
        document.getElementById('cambio-lado').style.display = ((gA + gB) % 2 !== 0) ? "block" : "none";
        if(gA === limiteTB && gB === limiteTB) modo = "TIE-BREAK
