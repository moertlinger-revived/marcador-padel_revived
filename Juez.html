<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUEZ PROFESIONAL (CONTROL DE TIEMPOS)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; text-align: center; }
        .panel-tiempos { background: #1a1a1a; border: 1px solid #444; border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .fila-tiempos { display: flex; justify-content: space-between; align-items: center; }
        .reloj-juez { font-family: monospace; font-size: 20px; color: #ccff00; }
        .btn-tiempo { padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-peloteo { background: #d32f2f; color: white; }
        .btn-juego { background: #2e7d32; color: white; }
        .btn-ocultar { background: #555; color: white; width: 100%; margin-top: 5px; }
        .encabezado { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .config-regla { background: #333; color: #fff; border: 1px solid #c6a052; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
        .tablero-juez { display: flex; flex-direction: column; gap: 10px; }
        .equipo-juez { background: #111; border: 2px solid #333; border-radius: 15px; padding: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .nombre-eq { color: #fff; font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        .puntos-juez { font-size: 80px; font-weight: 900; color: #c6a052; }
        .zona-controles { width: 100%; display: flex; gap: 10px; }
        .btn-accion { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; }
        .btn-punto { background: #c6a052; color: #000; }
        .btn-saque { background: #333; color: #ccff00; border: 1px solid #ccff00; }
        .btn-saque.activo { background: #ccff00; color: #000; }
        .btn-reiniciar { margin-top: 15px; background: #400; color: white; border: none; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="panel-tiempos">
        <div class="fila-tiempos">
            <div><span>PELOTEO:</span> <span id="display-peloteo" class="reloj-juez">05:00</span></div>
            <button class="btn-tiempo btn-peloteo" onclick="togglePeloteo()" id="btn-pelo-start">START</button>
        </div>
        <div class="fila-tiempos">
            <div><span>JUEGO:</span> <span id="display-juego" class="reloj-juez">00:00:00</span></div>
            <button class="btn-tiempo btn-juego" onclick="toggleJuego()" id="btn-juego-start">START</button>
        </div>
        <button class="btn-tiempo btn-ocultar" id="btn-fase" onclick="finalizarPeloteo()">OCULTAR PELOTEO Y EMPEZAR JUEGO</button>
    </div>

    <div class="encabezado">
        <button class="config-regla" id="btn-regla" onclick="cambiarReglaTB()">TIE-BREAK: 6-6</button>
        <div id="status-modo" style="color: #ccff00; font-size: 12px;">MODO: NORMAL</div>
    </div>

    <div class="tablero-juez">
        <div class="equipo-juez">
            <div class="nombre-eq" onclick="cambiarNombre(0)" id="nA">EQUIPO A</div>
            <div class="puntos-juez" id="pA">0</div>
            <div class="zona-controles">
                <button class="btn-accion btn-punto" onclick="sumar(0)">+ PUNTO</button>
                <button class="btn-accion btn-saque" id="saqueA" onclick="definirSaque(0)">SAQUE</button>
            </div>
        </div>
        <div class="equipo-juez">
            <div class="nombre-eq" onclick="cambiarNombre(1)" id="nB">EQUIPO B</div>
            <div class="puntos-juez" id="pB">0</div>
            <div class="zona-controles">
                <button class="btn-accion btn-punto" onclick="sumar(1)">+ PUNTO</button>
                <button class="btn-accion btn-saque" id="saqueB" onclick="definirSaque(1)">SAQUE</button>
            </div>
        </div>
    </div>

    <button class="btn-reiniciar" onclick="reiniciarPartido()">REINICIAR TODO</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQkDrlFCRKMYDxM54dkl24hGu-e-ZdbMs",
        databaseURL: "https://padel-vivo-default-rtdb.firebaseio.com",
        projectId: "padel-vivo",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let segPeloteo = 300, segJuego = 0, corrPeloteo = false, corrJuego = false, mostrarPeloteoWeb = true, intPeloteo, intJuego;
    var pts = [0,0], historialSets = [[0,0,0], [0,0,0]], setActualIdx = 0, saqueEquipo = -1, modo = "NORMAL", limiteTB = 6, labels = ["0","15","30","40","Ad"];

    function togglePeloteo() {
        corrPeloteo = !corrPeloteo;
        document.getElementById('btn-pelo-start').innerText = corrPeloteo ? "PAUSE" : "START";
        if(corrPeloteo) { intPeloteo = setInterval(() => { if(segPeloteo > 0) { segPeloteo--; actualizarRelojes(); } }, 1000); } 
        else { clearInterval(intPeloteo); }
    }

    function toggleJuego() {
        corrJuego = !corrJuego;
        document.getElementById('btn-juego-start').innerText = corrJuego ? "PAUSE" : "START";
        if(corrJuego) { intJuego = setInterval(() => { segJuego++; actualizarRelojes(); }, 1000); } 
        else { clearInterval(intJuego); }
    }

    function finalizarPeloteo() {
        mostrarPeloteoWeb = false; corrPeloteo = false; clearInterval(intPeloteo);
        if(!corrJuego) toggleJuego();
        document.getElementById('btn-fase').innerText = "PELOTEO FINALIZADO";
        render();
    }

    function actualizarRelojes() {
        let mP = Math.floor(segPeloteo / 60), sP = segPeloteo % 60;
        document.getElementById('display-peloteo').innerText = `${mP}:${sP < 10 ? '0'+sP : sP}`;
        let hJ = Math.floor(segJuego / 3600), mJ = Math.floor((segJuego % 3600) / 60), sJ = segJuego % 60;
        document.getElementById('display-juego').innerText = `${hJ < 10 ? '0'+hJ : hJ}:${mJ < 10 ? '0'+mJ : mJ}:${sJ < 10 ? '0'+sJ : sJ}`;
        render();
    }

    function sumar(eq) {
        let ot = (eq === 0) ? 1 : 0;
        if(modo === "NORMAL") {
            if(pts[eq] < 3) pts[eq]++;
            else if(pts[eq] === 3 && pts[ot] < 3) { pts=[0,0]; ganarGame(eq); }
            else if(pts[eq] === 3 && pts[ot] === 3) pts[eq] = 4;
            else if(pts[eq] === 3 && pts[ot] === 4) pts[ot] = 3;
            else if(pts[eq] === 4) { pts=[0,0]; ganarGame(eq); }
        } else {
            pts[eq]++;
            if(pts[eq] >= 7 && (pts[eq] - pts[ot] >= 2)) { pts=[0,0]; ganarGame(eq); }
        }
        render();
    }

    function ganarGame(eq) {
        historialSets[eq][setActualIdx]++;
        let gA = historialSets[0][setActualIdx], gB = historialSets[1][setActualIdx];
        if(gA === limiteTB && gB === limiteTB) { modo = "TIE-BREAK"; }
        else if((gA >= 6 || gB >= 6) && Math.abs(gA - gB) >= 2 || (modo === "TIE-BREAK")) {
            ganarSet();
        }
        if(saqueEquipo !== -1) saqueEquipo = (saqueEquipo === 0) ? 1 : 0;
    }

    function ganarSet() {
        if(setActualIdx < 2) { setActualIdx++; modo = "NORMAL"; pts = [0,0]; }
        else alert("Partido finalizado");
    }

    function render() {
        let pA_txt = (modo === "NORMAL") ? labels[pts[0]] : pts[0];
        let pB_txt = (modo === "NORMAL") ? labels[pts[1]] : pts[1];
        document.getElementById('pA').innerHTML = pA_txt;
        document.getElementById('pB').innerHTML = pB_txt;
        document.getElementById('status-modo').innerText = "MODO: " + modo;
        document.getElementById('saqueA').className = "btn-accion btn-saque" + (saqueEquipo === 0 ? " activo" : "");
        document.getElementById('saqueB').className = "btn-accion btn-saque" + (saqueEquipo === 1 ? " activo" : "");

        db.ref("partido_actual").set({
            nombreE1: document.getElementById('nA').innerText,
            nombreE2: document.getElementById('nB').innerText,
            puntosE1: pA_txt, puntosE2: pB_txt,
            saque: saqueEquipo, mostrarPeloteo: mostrarPeloteoWeb,
            tiempoPeloteo: document.getElementById('display-peloteo').innerText,
            tiempoJuego: document.getElementById('display-juego').innerText,
            s1e1: historialSets[0][0], s2e1: historialSets[0][1], s3e1: historialSets[0][2],
            s1e2: historialSets[1][0], s2e2: historialSets[1][1], s3e2: historialSets[1][2]
        });
    }

    function definirSaque(eq) { saqueEquipo = eq; render(); }
    function cambiarNombre(eq) { let n = prompt("Nombre:"); if(n) { document.getElementById(eq===0?'nA':'nB').innerText = n.toUpperCase(); render(); } }
    function cambiarReglaTB() { limiteTB = (limiteTB === 6) ? 5 : 6; document.getElementById('btn-regla').innerHTML = "TIE-BREAK: " + limiteTB + "-" + limiteTB; }
    function reiniciarPartido() { if(confirm("¿Reiniciar?")) location.reload(); }
    render();
</script>
</body>
</html>
